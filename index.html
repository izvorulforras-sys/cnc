<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Wanhao D6 – Telefonos mozgatás</title>
  <style>
    :root{
      --bg1:#07162f;
      --bg2:#0d2247;
      --card:rgba(10,22,45,.92);
      --card2:rgba(255,255,255,.07);
      --text:#ffffff;
      --muted:#c8d7ff;
      --blue:#4b92ff;
      --blue2:#2f67d1;
      --green:#2cc26b;
      --green2:#1b8f4c;
      --red:#ff5b72;
      --red2:#d93c53;
      --amber:#ffbc42;
      --amber2:#d58a00;
      --shadow:0 10px 30px rgba(0,0,0,.28);
      --radius:20px;
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none; }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      font-family:Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,var(--bg2),var(--bg1));
    }

    body{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:10px;
    }

    .app{
      width:min(100%,480px);
      min-height:calc(100dvh - 20px);
      display:grid;
      grid-template-rows:auto auto 1fr auto;
      gap:10px;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,.08);
    }

    .title{
      padding:16px 18px;
      text-align:center;
      font-size:24px;
      font-weight:700;
    }

    .subtitle{
      margin-top:4px;
      font-size:13px;
      color:var(--muted);
      font-weight:500;
    }

    .step-card{
      padding:14px;
      display:grid;
      gap:10px;
    }

    .label{
      text-align:center;
      font-size:14px;
      color:var(--muted);
      font-weight:700;
    }

    .step-grid, .mode-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
    }

    .step-btn, .move-btn, .z-btn, .small-btn, .mode-btn{
      border:none;
      border-radius:18px;
      color:#fff;
      font-weight:700;
      cursor:pointer;
      box-shadow:var(--shadow);
      transition:transform .06s ease, opacity .15s ease, filter .15s ease;
    }

    .step-btn:active, .move-btn:active, .z-btn:active, .small-btn:active, .mode-btn:active{
      transform:scale(.97);
      filter:brightness(.96);
    }

    .step-btn{
      min-height:48px;
      font-size:18px;
      background:rgba(255,255,255,.10);
    }

    .step-btn.active{
      background:linear-gradient(180deg,var(--blue),var(--blue2));
    }

    .mode-btn{
      min-height:46px;
      font-size:14px;
      background:rgba(255,255,255,.08);
    }

    .mode-btn.active{
      background:linear-gradient(180deg,var(--amber),var(--amber2));
    }

    .main{
      padding:12px;
      display:grid;
      grid-template-columns:1.25fr .75fr;
      gap:10px;
      align-items:stretch;
    }

    .xy-wrap,.z-wrap{
      background:var(--card2);
      border-radius:18px;
      padding:10px;
    }

    .xy-title,.z-title{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      margin-bottom:10px;
    }

    .xy-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      grid-template-rows:repeat(3,88px);
      gap:8px;
    }

    .move-btn{
      font-size:34px;
      background:linear-gradient(180deg,var(--blue),var(--blue2));
    }

    .move-btn.center{
      background:linear-gradient(180deg,var(--red),var(--red2));
      font-size:18px;
    }

    .empty{ visibility:hidden; }

    .z-stack{
      display:grid;
      grid-template-rows:1fr 1fr;
      gap:8px;
      height:100%;
    }

    .z-btn{
      min-height:132px;
      font-size:30px;
      background:linear-gradient(180deg,var(--green),var(--green2));
    }

    .footer{
      padding:12px;
      display:grid;
      gap:8px;
    }

    .small-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    .small-btn{
      min-height:48px;
      font-size:17px;
      background:rgba(255,255,255,.10);
    }

    .status{
      text-align:center;
      min-height:34px;
      font-size:12px;
      color:var(--muted);
      line-height:1.4;
      white-space:pre-line;
    }

    @media (max-width:420px){
      .xy-grid{ grid-template-rows:repeat(3,78px); }
      .move-btn{ font-size:30px; }
      .z-btn{ min-height:116px; }
      .title{ font-size:21px; }
      .mode-btn{ font-size:13px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card title">
      Wanhao Duplicator 6
      <div class="subtitle">Telefonos mozgatás – minimal verzió</div>
    </div>

    <div class="card step-card">
      <div class="label">Lépésköz</div>
      <div class="step-grid">
        <button class="step-btn" data-step="0.1">0.1</button>
        <button class="step-btn active" data-step="1">1</button>
        <button class="step-btn" data-step="10">10</button>
      </div>

      <div class="label">Kapcsolat mód</div>
      <div class="mode-grid">
        <button class="mode-btn active" data-mode="demo">DEMO</button>
        <button class="mode-btn" data-mode="octoprint">OCTO</button>
        <button class="mode-btn" data-mode="custom">CUSTOM</button>
      </div>
    </div>

    <div class="card main">
      <div class="xy-wrap">
        <div class="xy-title">X / Y</div>
        <div class="xy-grid">
          <div class="empty"></div>
          <button class="move-btn control-btn" data-axis="Y" data-dir="+">▲</button>
          <div class="empty"></div>

          <button class="move-btn control-btn" data-axis="X" data-dir="-">◀</button>
          <button class="move-btn center control-btn" id="stopBtn">STOP</button>
          <button class="move-btn control-btn" data-axis="X" data-dir="+">▶</button>

          <div class="empty"></div>
          <button class="move-btn control-btn" data-axis="Y" data-dir="-">▼</button>
          <div class="empty"></div>
        </div>
      </div>

      <div class="z-wrap">
        <div class="z-title">Z</div>
        <div class="z-stack">
          <button class="z-btn control-btn" data-axis="Z" data-dir="+">Z+</button>
          <button class="z-btn control-btn" data-axis="Z" data-dir="-">Z−</button>
        </div>
      </div>
    </div>

    <div class="card footer">
      <div class="small-grid">
        <button class="small-btn control-btn" id="homeBtn">HOME</button>
        <button class="small-btn control-btn" id="motorsBtn">MOTOR OFF</button>
      </div>
      <div id="status" class="status">Készen áll.</div>
    </div>
  </div>

  <script>
    // =========================
    // BEÁLLÍTÁSOK
    // =========================
    let MODE = "demo"; // "demo" | "octoprint" | "custom"
    const OCTOPRINT_URL = "http://192.168.1.50"; // pl. http://192.168.1.50
    const OCTOPRINT_API_KEY = "";
    const CUSTOM_BRIDGE_URL = "http://192.168.1.60:5000/gcode"; // saját bridge végpont
    const FEEDRATE_XY = 3000;
    const FEEDRATE_Z = 600;

    let currentStep = 1;
    let audioContext = null;

    const statusEl = document.getElementById("status");
    const stepButtons = [...document.querySelectorAll(".step-btn")];
    const modeButtons = [...document.querySelectorAll(".mode-btn")];
    const moveButtons = [...document.querySelectorAll(".move-btn[data-axis], .z-btn[data-axis]")];
    const stopBtn = document.getElementById("stopBtn");
    const homeBtn = document.getElementById("homeBtn");
    const motorsBtn = document.getElementById("motorsBtn");
    const controlButtons = [...document.querySelectorAll(".control-btn, .step-btn, .mode-btn")];

    function setStatus(text){
      statusEl.textContent = `Mód: ${MODE.toUpperCase()} | Lépés: ${currentStep} mm\n${text}`;
    }

    function initAudio(){
      if (!audioContext) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx) audioContext = new Ctx();
      }
      if (audioContext && audioContext.state === "suspended") {
        audioContext.resume().catch(() => {});
      }
    }

    function beep(freq = 880, duration = 0.04, type = "sine", gainValue = 0.03){
      initAudio();
      if (!audioContext) return;

      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const now = audioContext.currentTime;

      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(gainValue, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.start(now);
      osc.stop(now + duration + 0.02);
    }

    function attachButtonSound(){
      controlButtons.forEach(btn => {
        btn.addEventListener("click", () => beep());
      });
    }

    function setStep(step){
      currentStep = Number(step);
      stepButtons.forEach(btn => btn.classList.toggle("active", Number(btn.dataset.step) === currentStep));
      setStatus(`Lépésköz beállítva: ${currentStep} mm`);
    }

    function setMode(mode){
      MODE = mode;
      modeButtons.forEach(btn => btn.classList.toggle("active", btn.dataset.mode === MODE));

      if (MODE === "demo") {
        setStatus("Demo mód aktív. A gombok működnek, de a nyomtató nem kap parancsot.");
      } else if (MODE === "octoprint") {
        setStatus("OctoPrint mód aktív. Ellenőrizd az URL-t és az API kulcsot a fájlban.");
      } else if (MODE === "custom") {
        setStatus("Custom mód aktív. Ellenőrizd a bridge URL címet a fájlban.");
      }
    }

    async function sendGcode(commands, actionText){
      const list = Array.isArray(commands) ? commands : [commands];
      const payloadText = list.join(" | ");

      if (MODE === "demo") {
        console.log("DEMO GCODE:", list);
        setStatus(`${actionText} · ${payloadText}`);
        return true;
      }

      if (MODE === "octoprint") {
        try {
          const response = await fetch(`${OCTOPRINT_URL}/api/printer/command`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-Api-Key": OCTOPRINT_API_KEY
            },
            body: JSON.stringify({ commands: list })
          });

          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          setStatus(`${actionText} elküldve`);
          return true;
        } catch (error) {
          console.error(error);
          setStatus(`OctoPrint hiba: ${error.message}`);
          return false;
        }
      }

      if (MODE === "custom") {
        try {
          const response = await fetch(CUSTOM_BRIDGE_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ commands: list })
          });

          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          setStatus(`${actionText} elküldve`);
          return true;
        } catch (error) {
          console.error(error);
          setStatus(`Bridge hiba: ${error.message}`);
          return false;
        }
      }

      setStatus("Ismeretlen mód");
      return false;
    }

    function buildMoveCommand(axis, dir){
      const sign = dir === "+" ? 1 : -1;
      const value = sign * currentStep;
      const feed = axis === "Z" ? FEEDRATE_Z : FEEDRATE_XY;
      return [
        "G91",
        `G1 ${axis}${value} F${feed}`,
        "G90"
      ];
    }

    stepButtons.forEach(btn => {
      btn.addEventListener("click", () => setStep(btn.dataset.step));
    });

    modeButtons.forEach(btn => {
      btn.addEventListener("click", () => setMode(btn.dataset.mode));
    });

    moveButtons.forEach(btn => {
      btn.addEventListener("click", async () => {
        const axis = btn.dataset.axis;
        const dir = btn.dataset.dir;
        const mm = `${dir}${currentStep}`;
        await sendGcode(buildMoveCommand(axis, dir), `${axis} ${mm} mm`);
      });
    });

    stopBtn.addEventListener("click", async () => {
      beep(220, 0.08, "square", 0.05);
      await sendGcode(["M112"], "Vészleállítás");
    });

    homeBtn.addEventListener("click", async () => {
      await sendGcode(["G28"], "Home");
    });

    motorsBtn.addEventListener("click", async () => {
      await sendGcode(["M84"], "Motorok kikapcsolva");
    });

    attachButtonSound();
    setStep(1);
    setMode("demo");
  </script>
</body>
</html>
