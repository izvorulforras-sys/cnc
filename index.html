
<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Wanhao D6 telefonos vezérlés</title>
  <style>
    :root{
      --bg:#0f1115; --panel:#181c23; --panel2:#202632; --text:#f2f5f8; --muted:#9aa6b2;
      --accent:#4da3ff; --danger:#ff5d5d; --ok:#38c172; --btn:#2a3140; --btn-active:#3b4a63;
      --shadow:0 8px 24px rgba(0,0,0,.25); --radius:18px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#0f1115,#151922);color:var(--text);min-height:100vh;display:flex;justify-content:center}
    .wrap{width:100%;max-width:460px;padding:14px}
    .card{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px;border:1px solid rgba(255,255,255,.05)}
    h1{margin:0 0 6px;font-size:22px;text-align:center}
    .sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:6px}
    .row{display:flex;gap:10px;align-items:center}
    .server-input{width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:var(--panel2);color:var(--text);font-size:15px;outline:none}
    .mini{flex:1;padding:11px 12px;border:none;border-radius:14px;background:var(--btn);color:#fff;font-weight:700;cursor:pointer}
    .mini:active{transform:scale(.98); background:var(--btn-active)}
    .status{margin-top:10px;font-size:13px;color:var(--muted);text-align:center;min-height:18px;line-height:1.4}
    .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .step-btn{padding:14px 0;border:none;border-radius:16px;background:var(--btn);color:#fff;font-size:20px;font-weight:700;cursor:pointer}
    .step-btn.active{background:var(--accent);color:#08101a}
    .joy{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;align-items:stretch}
    .btn{border:none;border-radius:20px;background:var(--btn);color:#fff;min-height:82px;font-size:30px;font-weight:700;cursor:pointer;box-shadow:var(--shadow);touch-action:manipulation}
    .btn:active,.btn.hold{background:var(--btn-active);transform:scale(.98)}
    .center{display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1.15;text-align:center}
    .zrow,.actionrow{display:grid;gap:10px}
    .zrow{grid-template-columns:1fr 1fr}
    .actionrow{grid-template-columns:1fr 1fr 1fr}
    .danger{background:#5a2424}.danger:active,.danger.hold{background:#7a2f2f}
    .ok{background:#21492f}.ok:active,.ok.hold{background:#2b6541}
    .smalltxt{font-size:16px}.footer{text-align:center;color:var(--muted);font-size:12px;padding:4px 0 16px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Wanhao D6 vezérlő</h1>
    <div class="sub">Telefonos joystick felület</div>
    <div class="row">
      <input id="serverUrl" class="server-input" type="text" value="http://192.168.100.158:5000" />
    </div>
    <div class="row" style="margin-top:10px">
      <button class="mini" id="saveBtn">Mentés</button>
      <button class="mini" id="testBtn">Teszt</button>
      <button class="mini" id="diagBtn">Diag</button>
    </div>
    <div class="status" id="status">Kapcsolat nincs tesztelve.</div>
  </div>

  <div class="card">
    <div class="sub" style="margin-bottom:10px">Lépésköz (mm)</div>
    <div class="steps">
      <button class="step-btn" data-step="0.1">0.1</button>
      <button class="step-btn active" data-step="1">1</button>
      <button class="step-btn" data-step="10">10</button>
    </div>
  </div>

  <div class="card">
    <div class="joy">
      <div></div>
      <button class="btn move" data-axis="Y" data-dir="1">▲</button>
      <div></div>

      <button class="btn move" data-axis="X" data-dir="-1">◀</button>
      <button class="btn center ok" id="homeBtn">HOME</button>
      <button class="btn move" data-axis="X" data-dir="1">▶</button>

      <div></div>
      <button class="btn move" data-axis="Y" data-dir="-1">▼</button>
      <div></div>
    </div>
  </div>

  <div class="card">
    <div class="zrow">
      <button class="btn move smalltxt" data-axis="Z" data-dir="1">Z +</button>
      <button class="btn move smalltxt" data-axis="Z" data-dir="-1">Z -</button>
    </div>
  </div>

  <div class="card">
    <div class="actionrow">
      <button class="btn danger smalltxt" id="stopBtn">STOP</button>
      <button class="btn smalltxt" id="offBtn">MOTOR OFF</button>
      <button class="btn smalltxt" id="reloadBtn">ÚJRA</button>
    </div>
  </div>

  <div class="footer">A Python háttérprogramnak futnia kell a gépen.</div>
</div>

<script>
(function(){
  let step = Number(localStorage.getItem("wanhao_step") || "1");
  let server = localStorage.getItem("wanhao_server") || "http://192.168.100.158:5000";
  let holdTimer = null, holdInterval = null;
  const statusEl = document.getElementById("status");
  const inputEl = document.getElementById("serverUrl");
  inputEl.value = server;

  function setStatus(msg, ok=false, bad=false){
    statusEl.textContent = msg;
    statusEl.style.color = ok ? "#38c172" : bad ? "#ff7b7b" : "#9aa6b2";
  }

  function beep(freq=880, dur=0.04){
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine"; osc.frequency.value = freq; gain.gain.value = 0.03;
      osc.connect(gain); gain.connect(ctx.destination); osc.start();
      osc.stop(ctx.currentTime + dur); osc.onended = ()=>ctx.close();
    }catch(e){}
  }

  function normalizeServer(url){
    url = String(url || "").trim();
    if(!url) return "";
    if(!/^https?:\/\//i.test(url)) url = "http://" + url;
    return url.replace(/\/+$/,'');
  }

  async function api(path){
    const url = normalizeServer(server) + path;
    const res = await fetch(url, { method: "GET", mode: "cors", cache: "no-store" });
    let data = null;
    try { data = await res.json(); } catch(e) {}
    if(!res.ok){
      const msg = data && data.message ? data.message : ("HTTP " + res.status);
      throw new Error(msg);
    }
    return data || {ok:true, message:"OK"};
  }

  function updateStepButtons(){
    document.querySelectorAll(".step-btn").forEach(btn=>{
      btn.classList.toggle("active", Number(btn.dataset.step) === step);
    });
  }

  function saveSettings(){
    server = normalizeServer(inputEl.value);
    localStorage.setItem("wanhao_server", server);
    localStorage.setItem("wanhao_step", String(step));
    setStatus("Mentve: " + server, true, false);
    beep(950, 0.05);
  }

  async function testConnection(){
    server = normalizeServer(inputEl.value);
    if(!server){ setStatus("Adj meg szerver címet.", false, true); return; }
    setStatus("Kapcsolat tesztelése...");
    try{
      const r = await api("/health");
      setStatus(r.message, true, false);
      beep(1200, 0.05);
    }catch(e){
      setStatus("Teszt hiba: " + e.message, false, true);
      beep(220, 0.08);
    }
  }

  async function diag(){
    server = normalizeServer(inputEl.value);
    try{
      const r = await api("/diag");
      const lines = [];
      if(r.message) lines.push(r.message);
      if(r.port) lines.push("Port: " + r.port);
      if(r.baudrate) lines.push("Baud: " + r.baudrate);
      if(r.handshake) lines.push("Handshake: " + r.handshake);
      if(r.last_response) lines.push("Válasz: " + r.last_response);
      setStatus(lines.join(" | "), !!r.ok, !r.ok);
      if(r.ok) beep(1200, 0.05); else beep(220, 0.08);
    }catch(e){
      setStatus("Diag hiba: " + e.message, false, true);
      beep(220, 0.08);
    }
  }

  async function move(axis, dir){
    try{
      const r = await api(`/move?axis=${encodeURIComponent(axis)}&dir=${encodeURIComponent(dir)}&step=${encodeURIComponent(step)}`);
      setStatus(`${axis} ${dir > 0 ? "+" : "-"} ${step} mm · ${r.message}`, true, false);
    }catch(e){
      setStatus("Mozgás hiba: " + e.message, false, true);
      beep(220, 0.08);
    }
  }

  async function home(){
    try{
      const r = await api("/home");
      setStatus(r.message, true, false);
    }catch(e){
      setStatus("HOME hiba: " + e.message, false, true);
      beep(220, 0.08);
    }
  }

  async function stopNow(){
    try{
      const r = await api("/stop");
      setStatus(r.message, true, false);
    }catch(e){
      setStatus("STOP hiba: " + e.message, false, true);
      beep(220, 0.08);
    }
  }

  async function motorOff(){
    try{
      const r = await api("/motor_off");
      setStatus(r.message, true, false);
    }catch(e){
      setStatus("Motor off hiba: " + e.message, false, true);
      beep(220, 0.08);
    }
  }

  function startHold(button, fn){
    fn(); beep(); button.classList.add("hold");
    holdTimer = setTimeout(()=>{ holdInterval = setInterval(fn, 250); }, 350);
  }

  function stopHold(button){
    if(button) button.classList.remove("hold");
    clearTimeout(holdTimer); clearInterval(holdInterval);
    holdTimer = null; holdInterval = null;
  }

  document.querySelectorAll(".step-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      step = Number(btn.dataset.step);
      updateStepButtons();
      localStorage.setItem("wanhao_step", String(step));
      setStatus(`Lépésköz: ${step} mm`);
      beep(1050, 0.04);
    });
  });

  document.querySelectorAll(".move").forEach(btn=>{
    const axis = btn.dataset.axis, dir = Number(btn.dataset.dir), fn = ()=>move(axis, dir);
    btn.addEventListener("mousedown", ()=>startHold(btn, fn));
    btn.addEventListener("mouseup", ()=>stopHold(btn));
    btn.addEventListener("mouseleave", ()=>stopHold(btn));
    btn.addEventListener("touchstart", (e)=>{ e.preventDefault(); startHold(btn, fn); }, {passive:false});
    btn.addEventListener("touchend", (e)=>{ e.preventDefault(); stopHold(btn); }, {passive:false});
    btn.addEventListener("touchcancel", ()=>stopHold(btn));
  });

  document.getElementById("homeBtn").addEventListener("click", ()=>{ beep(); home(); });
  document.getElementById("stopBtn").addEventListener("click", ()=>{ beep(300,0.08); stopNow(); });
  document.getElementById("offBtn").addEventListener("click", ()=>{ beep(); motorOff(); });
  document.getElementById("reloadBtn").addEventListener("click", ()=>location.reload());
  document.getElementById("saveBtn").addEventListener("click", saveSettings);
  document.getElementById("testBtn").addEventListener("click", testConnection);
  document.getElementById("diagBtn").addEventListener("click", diag);

  updateStepButtons();
})();
</script>
</body>
</html>
